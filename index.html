.search-btn:hover { opacity: 0.88; }
#results { display: none; margin-top: 0; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.result-count { font-size: 13px; color: #5f5e5a; }
.type-tabs { display: flex; gap: 8px; }
.type-tab { padding: 5px 14px; border-radius: 20px; border: 0.5px solid #b4b2a9; font-size: 13px; cursor: pointer; background: #fff; color: #5f5e5a; font-family: inherit; transition: all 0.15s; }
.type-tab.active { background: #f1efe8; color: #1a1a18; border-color: #888780; font-weight: 500; }
.cards { display: flex; flex-direction: column; gap: 10px; }
.card { background: #fff; border: 0.5px solid #e0ded6; border-radius: 12px; padding: 1rem 1.25rem; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.card-name { font-size: 15px; font-weight: 500; color: #1a1a18; }

.badge-restaurant { background: #E6F1FB; color: #0C447C; }
.badge-hotel { background: #EAF3DE; color: #27500A; }
.card-addr { font-size: 13px; color: #5f5e5a; margin-bottom: 6px; }
.card-supported { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.atag { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: #E1F5EE; color: #085041; }
.card-note { font-size: 12px; color: #888780; padding-top: 8px; border-top: 0.5px solid #e0ded6; line-height: 1.6; }
.rating { color: #BA7517; font-size: 13px; margin-left: 6px; }
.empty { text-align: center; padding: 2.5rem; color: #888780; font-size: 14px; }

let allResults = [];

document.querySelectorAll('.allergen-btn').forEach(b=>b.addEventListener('click',()=>b.classList.toggle('active')));

function doSearch(){
  const pref=document.getElementById('prefecture').value;
  if(!pref){alert('都道府県を選択してください');return;}
  const facility=document.getElementById('facility').value;
  let results=DB.filter(r=>r.pref===pref);
  if(facility!=='both')results=results.filter(r=>r.type===facility);
  allResults=results;
  document.getElementById('results').style.display='block';
  renderTabs(facility);
  renderCards(allResults);
  document.getElementById('resultLabel').textContent=allResults.length>0
    ?`${pref} — ${allResults.length}件見つかりました`
    :`${pref} — 条件に合う施設が見つかりませんでした`;
}

function renderTabs(facility){
  const tabs=document.getElementById('typeTabs');
  if(facility!=='both'){tabs.innerHTML='';return;}
  const hasR=allResults.some(r=>r.type==='restaurant');
  const hasH=allResults.some(r=>r.type==='hotel');
  if(!hasR||!hasH){tabs.innerHTML='';return;}
  tabs.innerHTML=`
    <button class="type-tab active" onclick="filterTab('all',this)">すべて</button>
    <button class="type-tab" onclick="filterTab('restaurant',this)">レストラン</button>
    <button class="type-tab" onclick="filterTab('hotel',this)">ホテル</button>`;
}

function filterTab(type,el){
  document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const filtered=type==='all'?allResults:allResults.filter(r=>r.type===type);
  renderCards(filtered);
}

function renderCards(items){
  const cards=document.getElementById('cards');
  if(!items.length){cards.innerHTML='<div class="empty">条件を変えてもう一度お試しください</div>';return;}
  const sorted=[...items].sort((a,b)=>b.rating-a.rating);
  cards.innerHTML=sorted.map(r=>{
    const badge=r.type==='restaurant'
      ?'<span class="type-badge badge-restaurant">レストラン</span>'
      :'<span class="type-badge badge-hotel">ホテル</span>';
    const tags=r.supported.map(s=>`<span class="atag">${s}</span>`).join('');
    return `<div class="card">
      <div class="card-top"><span class="card-name">${r.name}</span>${badge}</div>
      <div class="card-addr">${r.addr}<span class="rating">★${r.rating.toFixed(1)}</span></div>
      <div class="card-supported">${tags}</div>
      <div class="card-note">${r.note}</div>
    </div>`;
  }).join('');
}
